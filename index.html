<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="麻雀コーチ">
    <meta name="theme-color" content="#07352d">
    <title>麻雀コーチ付き練習ゲーム</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="table" aria-label="麻雀コーチ付き練習ゲーム">
      <header class="topbar">
        <div>
          <h1>麻雀コーチ付き練習ゲーム</h1>
          <p id="roundText">東一局 / 親: あなた / 門前練習</p>
        </div>
        <div class="controls">
          <button id="riichiButton" class="riichi-button" type="button" disabled>リーチ（鳴かずにテンパイして宣言する役）</button>
          <select id="trainingModeSelect" class="training-select" title="練習したい形を選ぶ">
            <option value="random">通常ランダム</option>
            <option value="kokushi">国士無双チャンス</option>
            <option value="pinfu">ピンフ・リーチ練習</option>
            <option value="chiitoi">七対子練習</option>
            <option value="tanyao">タンヤオ練習</option>
            <option value="defense">相手リーチ守備練習</option>
          </select>
          <button id="applyTrainingButton" type="button" title="選んだ練習形で配牌する">練習配置</button>
          <button id="sortButton" type="button" title="手牌を並べ替える">整列</button>
          <button id="newGameButton" type="button" title="新しい局を始める">新局</button>
        </div>
      </header>

      <section class="scoreboard" aria-label="点数">
        <article class="seat current">
          <span>あなた</span>
          <strong id="score0">25000</strong>
        </article>
        <article class="seat">
          <span>CPU 左</span>
          <strong id="score1">25000</strong>
        </article>
        <article class="seat">
          <span>CPU 対面</span>
          <strong id="score2">25000</strong>
        </article>
        <article class="seat">
          <span>CPU 右</span>
          <strong id="score3">25000</strong>
        </article>
      </section>

      <section class="center">
        <div class="wall">
          <span>牌山</span>
          <strong id="wallCount">82</strong>
        </div>
        <div class="dora-box" aria-label="ドラ表示牌">
          <span class="mini-label">ドラ表示牌</span>
          <span id="doraIndicator" class="tile small"></span>
          <span id="doraText" class="dora-label"></span>
        </div>
        <div class="draw-box" aria-label="ツモ牌">
          <span class="mini-label">ツモ牌</span>
          <span id="drawTileMini" class="tile small"></span>
          <span id="drawText" class="draw-label"></span>
        </div>
        <div class="message" id="message">手牌から1枚クリックして打牌してください。</div>
        <button id="winButton" class="win-button" type="button" disabled>和了</button>
        <div id="callPanel" class="call-panel" hidden>
          <strong id="callPrompt">鳴けます。</strong>
          <span id="callButtons"></span>
        </div>
      </section>

      <div class="main-grid">
        <div class="board">
          <section class="opponents" aria-label="相手">
            <article class="opponent">
              <div class="name">CPU 左</div>
              <div class="concealed" id="cpu1Hand"></div>
              <div class="river" id="river1"></div>
            </article>
            <article class="opponent">
              <div class="name">CPU 対面</div>
              <div class="concealed" id="cpu2Hand"></div>
              <div class="river" id="river2"></div>
            </article>
            <article class="opponent">
              <div class="name">CPU 右</div>
              <div class="concealed" id="cpu3Hand"></div>
              <div class="river" id="river3"></div>
            </article>
          </section>

          <section class="player-area" aria-label="あなたの手牌">
            <div class="river player-river" id="river0"></div>
            <div id="playerMelds" class="melds" aria-label="あなたの副露"></div>
            <div class="hand-row">
              <div>
                <span class="mini-label">手牌</span>
                <div class="hand" id="playerHand"></div>
              </div>
              <div class="drawn-slot">
                <span class="mini-label">ツモ</span>
                <div id="drawnTileSlot"></div>
              </div>
            </div>
          </section>
        </div>

        <aside class="coach" aria-label="コーチのアドバイス">
          <div class="coach-header">
            <h2>コーチのアドバイス</h2>
            <span id="shantenBadge" class="shanten-badge">分析中</span>
          </div>
          <div class="recommend-card">
            <span id="recommendedTile" class="tile"></span>
            <div>
              <span>おすすめ打牌</span>
              <strong id="recommendedText">分析中</strong>
            </div>
          </div>
          <section class="yaku-candidates" aria-label="役候補">
            <h3>役候補を選んで牌を確認</h3>
            <div id="yakuCandidateButtons" class="yaku-buttons"></div>
          </section>
          <dl class="advice-list">
            <div class="advice-item">
              <dt>その牌を切る理由</dt>
              <dd id="reasonText"></dd>
            </div>
            <div class="advice-item">
              <dt>今の手が何を作っているか</dt>
              <dd id="shapeText"></dd>
            </div>
            <div class="advice-item">
              <dt>役の組み合わせ</dt>
              <dd id="yakuText"></dd>
            </div>
            <div class="advice-item">
              <dt>鳴いてよいか</dt>
              <dd id="callText"></dd>
            </div>
            <div class="advice-item">
              <dt>どの牌が来たら嬉しいか</dt>
              <dd>
                <span id="happyText"></span>
                <span id="happyTiles" class="happy-tiles"></span>
              </dd>
            </div>
            <div class="advice-item">
              <dt>初心者向けの短い解説</dt>
              <dd id="lessonText"></dd>
            </div>
            <div class="advice-item">
              <dt>点数計算の根拠</dt>
              <dd id="scoreExplainText"></dd>
            </div>
          </dl>
          <section class="opponent-analysis" aria-label="相手の狙い予想">
            <h2>相手の狙い予想</h2>
            <div id="opponentAnalysisList" class="opponent-cards"></div>
          </section>
        </aside>
      </div>

      <aside class="log" aria-label="進行ログ">
        <h2>ログ</h2>
        <ol id="logList"></ol>
      </aside>
    </main>
    <script src="app.js"></script>
  </body>
</html>
